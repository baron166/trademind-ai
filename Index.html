<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<h1>TradeMind AI 🚀 LIVE TEST</h1>
<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: white;
  text-align: center;
  padding: 30px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #111a2e;
  padding: 20px;
  border-radius: 12px;
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px 20px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  margin-top: 10px;
}

.result {
  margin-top: 20px;
  padding: 15px;
  background: #0f172a;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
<h1>TradeMind AI</h1>
<p>Analyze global deals before you buy</p>

<input id="product" placeholder="Product name">

<select id="buy">
<option>Japan</option>
<option>USA</option>
<option>Germany</option>
</select>

<select id="sell">
<option>Jordan</option>
<option>UAE</option>
<option>Turkey</option>
</select>

<input id="price" placeholder="Purchase price ($)">

<button onclick="calc()">Analyze Deal</button>

<div class="result" id="out"></div>
</div>

<script>
function calc(){
let price = Number(document.getElementById("price").value);

let shipping = price * 0.08;
let tax = price * 0.12;
let profit = price * 0.30 - shipping - tax;

let status = "Weak Deal ❌";
if(profit > 100) status = "Good Deal ⚠️";
if(profit > 250) status = "Strong Deal ✅";

document.getElementById("out").innerHTML = `
Shipping: $${shipping.toFixed(2)} <br>
Tax: $${tax.toFixed(2)} <br>
Estimated Profit: $${profit.toFixed(2)} <br><br>
<b>${status}</b>
`;
}
</script>

</body>
</html>
