<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeMind AI</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <h1> TradeMind AI</h1>

    <p>
        AI-powered platform for analyzing international trade deals.
    </p>

    <div class="hero-buttons">

        <button>Start Free</button>

        <button>Learn More</button>

    </div>

</header>

    <main>

        <section class="card">

            <label>Product</label>
            <input type="text" id="product" placeholder="iPhone 16 Pro">

            <label>Buy Country</label>
            <select id="buyCountry">
                <option>Japan</option>
                <option>USA</option>
                <option>Germany</option>
            </select>

            <label>Sell Country</label>
            <select id="sellCountry">
                <option>Jordan</option>
                <option>Turkey</option>
                <option>UAE</option>
            </select>

            <label>Purchase Price ($)</label>
            <input type="number" id="price" placeholder="1000">

            <button onclick="analyzeDeal()">
                Analyze Deal
            </button>

        </section>

        <section class="card">

            <h2>Analysis Result</h2>

            <div id="result">
                Enter product information then click Analyze.
            </div>

        </section>

    </main>

    <script src="js/app.js"></script>

</body>
</html>
